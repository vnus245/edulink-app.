<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <style>
        #ui { position: absolute; top: 10px; left: 10px; z-index: 999; }
        button { padding: 10px; background: lime; cursor: pointer; border: none; font-weight: bold; }
        #msg { color: white; background: rgba(0,0,0,0.5); padding: 5px; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="validar()">VALIDAR POSIÇÃO</button>
        <div id="msg"></div>
    </div>

    <a-scene physics="debug: false">
        <a-sky color="#111"></a-sky>
        <a-plane static-body rotation="-90 0 0" width="50" height="50" color="#222"></a-plane>
        
        <a-entity id="player" camera wasd-controls look-controls kinematic-body position="0 1.6 5">
            <a-cursor></a-cursor>
            <a-box position="0.2 -0.2 -0.4" scale="0.05 0.05 0.3" color="blue"></a-box>
        </a-entity>

        <a-box id="flag" static-body position="0 1 -5" color="red"></a-box>
    </a-scene>

    <script>
        // Função de Tiro
        window.addEventListener('mousedown', () => {
            let b = document.createElement('a-sphere');
            b.setAttribute('radius', '0.05');
            b.setAttribute('color', 'orange');
            let pos = document.querySelector('#player').getAttribute('position');
            b.setAttribute('position', pos);
            b.setAttribute('dynamic-body', 'mass: 0.1');
            document.querySelector('a-scene').appendChild(b);
            
            setTimeout(() => {
                const impulse = new THREE.Vector3(0, 0, -20);
                impulse.applyQuaternion(document.querySelector('#player').object3D.quaternion);
                b.body.applyImpulse(new CANNON.Vec3(impulse.x, impulse.y, impulse.z), new CANNON.Vec3().copy(b.getAttribute('position')));
            }, 10);
        });

        // Validação
        function validar() {
            const p = document.querySelector('#player').getAttribute('position');
            const f = document.querySelector('#flag').getAttribute('position');
            const d = Math.sqrt(Math.pow(p.x-f.x, 2) + Math.pow(p.z-f.z, 2));
            const m = document.querySelector('#msg');
            m.style.display = "block";
            m.innerText = d < 2 ? "✅ PERTO DA BANDEIRA!" : "❌ LONGE! DISTÂNCIA: " + d.toFixed(2);
        }
    </script>
</body>
</html>
